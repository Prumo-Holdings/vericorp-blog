# Deploy Hugo blog to Cloudflare Pages
# Triggered on push to main branch

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, content/draft]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler@latest pages deploy public --project-name=vericorp-blog
