baseURL = "https://vericorp-blog.pages.dev/"
languageCode = "en"
title = "VeriCorp Blog"
theme = "PaperMod"
relativeURLs = true

[params]
  env = "production"
  description = "VeriCorp — Developer Blog"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  disableSpecial1stPost = true

  [params.label]
    text = "VeriCorp"
    icon = "/logo.png"
    iconHeight = 40

  [params.assets]
    favicon = "/favicon.png"
    favicon16x16 = "/favicon.png"
    favicon32x32 = "/favicon.png"
    apple_touch_icon = "/apple-touch-icon.png"

  [params.homeInfoParams]
    Title = "VeriCorp"
    Content = "Developer blog and technical insights."


[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false

[sitemap]
  changefreq = "weekly"
  priority = 0.5
